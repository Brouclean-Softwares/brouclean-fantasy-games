<div class="uk-overflow-auto">
    <table class="uk-table uk-table-striped uk-table-small uk-table-hover">
        <thead>
        <tr>
            <th>Nom</th>
            <th>Jeu</th>
        </tr>
        </thead>

        <tbody>
        {% for campaign in owned_campaigns %}
        <tr>
            <td class="uk-table-link">
                <a class="uk-link-reset" href="/role_playing_games/campaigns/campaign?id={{ campaign.id }}">
                    {{ campaign.name }}
                </a>
            </td>
            <td class="uk-table-link">
                <a class="uk-link-reset" href="/role_playing_games/campaigns/campaign?id={{ campaign.id }}">
                    {% if let Some(external_logo_url) = campaign.game_external_logo_url %}
                    <span class="uk-visible@m uk-margin-right">{{ campaign.game_name }}</span>
                    <img src="{{ external_logo_url }}" class="uk-height-max-small" style="max-height:25px; width:auto;" alt="">
                    {% else %}
                    {{ campaign.game_name }}
                    {% endif %}
                </a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

{{ add_new_campaign_button|escape("none") }}
