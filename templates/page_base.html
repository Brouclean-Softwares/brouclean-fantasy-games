<!doctype html>
<html>

<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <link rel="stylesheet" href="/assets/css/uikit.min.css" />

    <script src="/assets/js/uikit.min.js"></script>
    <script src="/assets/js/uikit-icons.min.js"></script>
    <script src="/assets/js/htmx.min.js"></script>
    <script src="/assets/js/alpine.min.js"></script>

    <script src="/assets/js/tinymce/js/tinymce/tinymce.min.js" referrerpolicy="origin" crossorigin="anonymous"></script>
    <script>
        tinymce.init({
            selector: '.rich_text_zone',
            plugins: 'link lists',
            toolbar: `
                undo redo |
                formatselect |
                bold italic underline |
                alignleft aligncenter alignright |
                bullist numlist |
                link unlink
              `,
            license_key: 'gpl'
        });
    </script>

    <link href="/manifest.webmanifest" rel="manifest">

    <title>{% block title %}Brouclean Fantasy Games{% endblock %}</title>

    {% block head %}{% endblock %}
</head>

<body>
{% block navbar %}{% endblock %}

{% block messages %}{% endblock %}

<div class="uk-section">
    <div class="uk-container">
        {% block breadcrumb %}{% endblock %}

        {% block body %}{% endblock %}
    </div>
</div>
</body>

</html>
