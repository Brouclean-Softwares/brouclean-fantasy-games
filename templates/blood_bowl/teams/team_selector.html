<div>
    <div class="uk-margin">
        <form class="uk-search uk-search-default">
            <input name="input_id_to_change" type="hidden" value="{{ input_id_to_change }}">

            <input class="uk-search-input uk-form-width-large"
                   type="search"
                   name="filter"
                   placeholder="Equipe ou coach à rechercher..."
                   hx-post="/blood_bowl/teams/filtered_list"
                   hx-include="[name='input_id_to_change']"
                   hx-trigger="keyup changed delay:500ms"
                   hx-target="#filtered_teams"
                   aria-label="Search">
            <span class="uk-search-icon-flip" uk-search-icon></span>
        </form>
    </div>

    <form method="post" autocomplete="off">
        <div id="filtered_teams">
            {{ team_filtered_list|escape("none") }}
        </div>
    </form>
</div>
