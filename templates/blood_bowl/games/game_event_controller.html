<div>
    <h3 class="uk-margin-medium-top uk-heading-divider">
        Nouveaux évènements
    </h3>
    <ul class="uk-margin-medium-top" uk-accordion>
        {{ first_team_event_controller|escape("none") }}
        {{ second_team_event_controller|escape("none") }}
    </ul>

    <div>
        <form method="post" autocomplete="off" class="uk-margin-medium-top uk-form-stacked">
            <input name="game_id"
                   type="hidden"
                   value="{{ game.id }}">

            <input name="cancel_last_event"
                   type="hidden"
                   value="true">

            <button class="uk-button uk-button-danger">
                Annuler le dernier évènement
            </button>
        </form>
    </div>
</div>
