<div>
    <h5>
        Classement ELO (calcul de la NAF)
    </h5>

    <div class="uk-overflow-auto">
        <table class="uk-table uk-table-striped uk-table-small uk-table-hover uk-table-middle">
            <thead>
            <tr>
                <th class="uk-table-shrink">#</th>
                <th class="uk-table-expand">Nom</th>
                <th class="uk-table-shrink">ELO</th>
            </tr>
            </thead>

            <tbody>

            {% for (i, coach) in coaches.iter().enumerate() %}
            <tr>
                <td>
                    <span class="uk-text-meta">#{{ i + 1 }}</span>
                </td>

                <td class="uk-text-truncate">
                    <span>{{ coach.name }}</span>
                </td>

                <td>
                    <span>{{ coach.elo.unwrap_or_default() }}</span>
                </td>
            </tr>
            {% endfor %}

            </tbody>
        </table>
    </div>
</div>
